version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: stc_db
    restart: always
    environment:
      POSTGRES_DB: student_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stc_backend
    restart: always
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:postgres@db:5432/student_db?schema=public
      - JWT_SECRET=sankalp_teaching_center_super_secret_jwt_key_2026
    depends_on:
      - db
    command: sh -c "npx prisma db push && npx prisma db seed && node dist/src/index.js"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: stc_frontend
    restart: always
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  pgdata:
